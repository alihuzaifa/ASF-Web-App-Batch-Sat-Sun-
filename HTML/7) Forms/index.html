    <form action="#" method="post">
        <p>Please Select your Gender</p>
        <label>
            <input type="radio" name="gender" required checked /> Male
        </label>

        
        <input type="radio" name="gender" id="gender" checked required />
        <label for="gender">Male</label>


        <label>
            <input type="radio" name="gender" required disabled /> Female
        </label>
        <button type="submit">Submit</button>
    </form>


    <form action="#" method="post">
        <p>Please Select your favourite sports</p>
        <label>
            <input type="checkbox" name="hobbies" required /> Cricket
        </label>
        <label>
            <input type="checkbox" name="hobbies" required /> Tennis
        </label>
        <label>
            <input type="checkbox" name="hobbies" checked required /> Football
        </label>
        <button type="submit">Submit</button>
    </form>
</body>
