<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Form</title>
    <style>
        body {
            background-color: black;
            color: white;
            text-align: center;
        }

        input {
            height: 40px;
            width: 300px;
        }

        button {
            background-color: white;
            color: black;
            width: 200px;
            height: 40px;
        }
    </style>
</head>

<body>
    <h1>Registration Form</h1>
    <form action="#" method="post">
        <input type="text" name="username" required placeholder="Enter Your Name" /> <br /><br />
        <input type="email" name="email" required placeholder="Enter Your Email" /><br /><br />
        <input type="password" name="password" required placeholder="Enter Your Password" /><br /><br />
        <input type="number" name="telephone" required placeholder="Enter Your Number" /><br /><br />
        <textarea name="message" placeholder="Enter Your Message" rows="10" cols="40"></textarea> <br /><br />
        <button>Submit Form</button>
    </form>
</body>

</html>
