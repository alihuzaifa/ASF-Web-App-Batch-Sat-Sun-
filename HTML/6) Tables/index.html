<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Table</title>
    <style>
        table {
            background-color: orange;
            color: white;
            border: 1px solid white;
        }

        td,
        th {
            border: 1px solid white;
        }
    </style>
</head>

<body>
    <table>
        <tr>
            <th></th>
            <th>9am</th>
            <th>10am</th>
            <th>11am</th>
            <th>12am</th>
        </tr>
        <tr>
            <th>Monday</th>
            <td colspan="2">Geography</td>
            <td>Math</td>
            <td>Arts</td>
        </tr>
        <tr>
            <th>Tuesday</th>
            <td colspan="3">Gym</td>
            <td>Sports</td>
        </tr>
    </table>

    <table>
        <thead>
            <tr>
                <th></th>
                <th>ABC</th>
                <th>DEF</th>
                <th>GHI</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th>6pm to 7pm</th>
                <td rowspan="2">Movie</td>
                <td>Comedy</td>
                <td>Sports</td>
            </tr>
            <tr>
                <th>10pm <br /> to 11pm</th>
                <td>Data 1</td>
                <td>Data 2</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
